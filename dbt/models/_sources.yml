version: 2

sources:
  - name: silver
    description: De-identified, conformed clean layer built by the bronze→silver pipeline.
    # On DuckDB silver lives in schema `silver`; on Databricks it's vitals_silver.clinical.
    database: "{{ 'vitals_silver' if target.type == 'databricks' else none }}"
    schema: "{{ 'clinical' if target.type == 'databricks' else 'silver' }}"
    tables:
      - name: patient
      - name: observation
      - name: condition
      - name: target
      - name: note
      - name: claim
      - name: pro
      - name: wearable_daily
