# Databricks Asset Bundle — the production deploy path for the Vitals medallion (ADR 0005).
#
# Build with connect, ship with the bundle:
#   DEV  = databricks-connect (make bronze-/silver-databricks) — laptop drives, Databricks computes;
#          fast feedback for building + parity-checking.
#   PROD = this bundle — Databricks owns it: a scheduled serverless JOB, deployed from code, with the
#          dbt tests as in-job quality gates. No laptop, no human.
#
# Deploy + run (auth from the environment — source infra/terraform/.env first):
#   databricks bundle validate && databricks bundle deploy && databricks bundle run vitals_medallion
bundle:
  name: vitals

variables:
  alert_email:
    description: |
      Recipient paged when an unattended run fails. Defaults to the deploying user (the workspace
      owner), resolved dynamically — no address is committed to this PUBLIC repo (same no-PII
      pattern as the Terraform UC grants). Override for a shared on-call list at deploy time:
      `export BUNDLE_VAR_alert_email=oncall@example.com` (the infra/terraform/.env we already
      source) or `databricks bundle deploy --var alert_email=...`.
    default: ${workspace.current_user.userName}

# Build the project wheel at deploy time so the medallion task can ship bronze/silver code to the
# job (ADR 0005). `uv build --wheel` emits ./dist/vitals-<version>-py3-none-any.whl; the ingest
# environment installs it from there.
artifacts:
  vitals_wheel:
    type: whl
    build: uv build --wheel
    path: .

targets:
  dev:
    mode: development
    default: true

resources:
  jobs:
    vitals_medallion:
      name: vitals-gold-refresh
      # Currently ships the GOLD stage as a scheduled serverless job (dbt marts + the 26 dbt tests
      # as in-job quality gates). Upstream bronze/silver run today via databricks-connect
      # (make bronze-/silver-databricks); promoting them into this job is a documented follow-up
      # (a python_wheel_task: ambient serverless Spark + generate to a writable dir + land to volume).
      # Daily refresh, PAUSED by default — this is a demo workspace; unpause to schedule for real.
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: Europe/Lisbon
        pause_status: PAUSED
      # Page someone when an unattended run FAILS — a deployed job that fails silently isn't
      # operated, it's just shipped. on_failure only (success is the boring default); a paused
      # demo shouldn't spam, so suppress alerts for skipped runs.
      email_notifications:
        on_failure:
          - ${var.alert_email}
      notification_settings:
        no_alert_for_skipped_runs: true
      # Serverless environments: one carrying the dbt adapter (gold task), one carrying numpy/pandas
      # for the drift task's PSI math (the spark_python_task runs on serverless compute).
      environments:
        - environment_key: dbt_env
          spec:
            client: "2"
            dependencies:
              - dbt-databricks>=1.8
        - environment_key: py_env
          spec:
            client: "2"
            dependencies:
              - numpy
              - pandas
        # Ingest task env: the project wheel itself (built by the `vitals_wheel` artifact above).
        # On serverless the wheel attaches via the environment's dependencies (not task `libraries`,
        # which is classic-cluster only); installing it makes the `vitals-medallion` entry point +
        # the ambient PySpark/SDK the bronze/silver landing needs available on-cluster.
        - environment_key: ingest_env
          spec:
            # client "3" = Python 3.12 (vs "2" = 3.11) — the wheel requires-python is >=3.12, so the
            # ingest env must be the 3.12 serverless runtime or the wheel won't install. dbt/py envs
            # stay on "2" (they install no 3.12-only wheel).
            client: "3"
            dependencies:
              - ./dist/*.whl
      tasks:
        # Ingest: the whole pre-gold medallion as ONE packaged task (generate synthetic data -> land
        # bronze Delta -> build de-identified silver Delta, with the PHI + non-empty gates). It's the
        # wheel's `vitals-medallion` entry point; generate/bronze/silver share one PySpark process +
        # session and hand data off in-process, so they're one task. The writable bronze dir is passed
        # as a parameter (/tmp on serverless). Runs first; gold + drift run downstream.
        - task_key: medallion_ingest
          environment_key: ingest_env
          python_wheel_task:
            package_name: vitals
            entry_point: vitals-medallion
            parameters:
              - /tmp/vitals_bronze
        # Gold: rebuild the dbt marts on Unity Catalog + run the 26 dbt tests as quality gates.
        - task_key: gold_dbt
          depends_on:
            - task_key: medallion_ingest
          environment_key: dbt_env
          dbt_task:
            project_directory: ./dbt
            # The managed dbt task auto-generates a profile (target: databricks_cluster) wired to
            # this warehouse + catalog/schema; our ./dbt/profiles.yml is for local/dev only.
            catalog: vitals_gold
            schema: marts
            commands:
              - "dbt build --target databricks_cluster"
            warehouse_id: e2d0993979faf3d2
        # Monitoring: PSI feature-drift on the fresh marts -> vitals_gold.monitoring.drift_report.
        # Downstream of gold so it scores fresh data; on the same schedule so drift is checked every
        # time the data moves, not by a side process that rots. The script reads the SAME drift math
        # the local monitor + unit tests use (src/ is synced by the bundle and imported on-cluster).
        - task_key: drift_monitor
          depends_on:
            - task_key: gold_dbt
          environment_key: py_env
          spark_python_task:
            python_file: ./pipelines/drift_job.py
            # Pass the bundle's synced files root so the script can import the shared src/ (serverless
            # runs the file via exec(), so __file__ is unbound — argv is the reliable locator).
            parameters:
              - ${workspace.file_path}
