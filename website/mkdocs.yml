site_name: Vitals
site_description: From raw clinical signals to trusted, AI-ready data — a health-data medallion lakehouse.
site_url: https://joaoblasques.com/vitals/
repo_url: https://github.com/joaoblasques/vitals
repo_name: joaoblasques/vitals

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - toc.follow
  icon:
    logo: material/heart-pulse

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Data Catalog & Lineage: catalog.md
  - Governance & Monitoring: governance.md
  - Roadmap: roadmap.md
  - Dev Log: dev-log.md
  - Results: results.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
