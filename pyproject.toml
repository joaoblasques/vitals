[project]
name = "vitals"
version = "0.0.1"
description = "From raw clinical signals to trusted, AI-ready data — a health-data medallion lakehouse."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    # Core DE — pinned loosely now; tightened as the MVP slice lands.
    "pyspark>=3.5",
    "dbt-databricks>=1.8",
    "great-expectations>=1.0",
    "feast>=0.40",
    "mlflow>=2.16",
    "pandas>=2.2",
]

[project.optional-dependencies]
dev = ["ruff", "pytest"]

[tool.ruff]
target-version = "py312"
line-length = 100
